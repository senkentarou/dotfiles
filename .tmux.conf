# cSpell:disable
#
# Tmux Window settings
#

# Fundamentals
set -g default-shell "${SHELL}"
set -g default-command "${SHELL}"
set -g default-terminal 'screen-256color'
set -g terminal-overrides 'xterm:colors=256'

set -gq status-utf8 "on"
set -g history-limit 10000

# Indexing
setw -g mouse on
setw -g automatic-rename off
setw -g pane-base-index 1
set -g base-index 1
set -g renumber-windows on
set -g focus-events on
set -g set-titles off

# Timing
set -g escape-time 1
set -g repeat-time 500

# Colors
set -g status-style bg=colour241,fg=colour255
setw -g window-status-format " @#I "
setw -g window-status-style bg=default,fg=colour245
setw -g window-status-current-format " @#I "
setw -g window-status-current-style bg=colour196,fg=colour255
set -g pane-border-style bg=default,fg=colour255
set -g pane-active-border-style bg=default,fg=green
set -g pane-border-status off
set -g message-style bg=colour196,fg=colour255
set -g mode-style bg=cyan,fg=black

# Status Bar Style
set -g status-position top
set -g status-justify left
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
set -g status-right ""

#
# KeyBindings
#

# to set my prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# to reload tmux settings
bind C-r source-file ~/.tmux.conf \; display "Reloaded!"

# to operate window / pane
unbind n # disable next-window
unbind p # disable previous-window
unbind s # disable choose-tree
unbind x # disable kill-pane
unbind z # disable resize-pane -Z (focus pane)
unbind d # disable detach session
unbind space # disable re-arrange pane

bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -r = new-window -c "#{pane_current_path}"

# session selector: pick from predefined list + current dir, create if not exists
bind -n M-j run-shell 'tmux display-popup -w 60% -h 50% -E "bash ~/.config/tmux/session_selector.sh \"#{pane_current_path}\""'
bind -n M-k run-shell 'tmux display-popup -w 60% -h 50% -E "bash ~/.config/tmux/session_selector.sh \"#{pane_current_path}\""'
bind \; run-shell 'tmux display-popup -w 60% -h 50% -E "bash ~/.config/tmux/session_selector.sh \"#{pane_current_path}\""'

bind -n M-h previous-window
bind -r C-h previous-window
bind -r C-j select-pane -t :.+
bind -r C-k select-pane -t :.-
bind -n M-l next-window
bind -r C-l next-window

# Cmd+number → window select (iTerm2 sends \e[91~ .. \e[99~ via key mapping)
set -s user-keys[0] "\e[91~"
set -s user-keys[1] "\e[92~"
set -s user-keys[2] "\e[93~"
set -s user-keys[3] "\e[94~"
set -s user-keys[4] "\e[95~"
set -s user-keys[5] "\e[96~"
set -s user-keys[6] "\e[97~"
set -s user-keys[7] "\e[98~"
set -s user-keys[8] "\e[99~"
bind -n User0 select-window -t :1
bind -n User1 select-window -t :2
bind -n User2 select-window -t :3
bind -n User3 select-window -t :4
bind -n User4 select-window -t :5
bind -n User5 select-window -t :6
bind -n User6 select-window -t :7
bind -n User7 select-window -t :8
bind -n User8 select-window -t :9

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# prefix + / to search in copy mode
bind / copy-mode \; send-keys ?

# to scroll terminal logs
setw -g mode-keys vi
bind m copy-mode
bind -Tcopy-mode-vi v send -X begin-selection
bind -Tcopy-mode-vi V send -X select-line
bind -Tcopy-mode-vi y send -X copy-pipe "pbcopy" \; send -X clear-selection
bind -Tcopy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
# avoid auto-exit copy mode when mouse drag is end. use y key to copy or CR key to mode off with copy
unbind -Tcopy-mode-vi MouseDragEnd1Pane
